#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "translite"
name = "TransLite"
description.en = "Frontend for Google Translate, DeepL, Yandex and DDG"
description.fr = "Frontend pour Google Translate, DeepL, Yandex et DDG"

version = "2026.03.21~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "Unlicense"
website = "https://tl.bloat.cat/"
demo = "https://tl.bloat.cat/"
code = "https://codeberg.org/gospodin/translite"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://codeberg.org/gospodin/translite/archive/2a81cf6bac9f65d234a0c843aabe66904fa434c0.tar.gz"
    sha256 = "f0c6ee442ef299521d9c8144472fcad4ee1036eea00853c1ca8d3974a9ac8045"

    autoupdate.strategy = "latest_forgejo_commit"

    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "php8.5-dom, php8.5-curl, php8.5-apcu"

    [resources.composer]
    version = "2.10.1"

